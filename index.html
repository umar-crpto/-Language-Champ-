<!DOCTYPE html>
<html>
<head>

<title>Language Champ</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

h1{
color:#58cc02;
}

.card{
background:white;
padding:20px;
margin:20px auto;
max-width:420px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#58cc02;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:gray;
}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<h1>Language Champ</h1>

<div class="card">

XP ⭐ <span id="xp">0</span><br>
Hearts ❤️ <span id="hearts">3</span><br>
Streak 🔥 <span id="streak">0</span>

</div>

<div id="languageScreen" class="card">

<h2>Select Language</h2>

<button onclick="chooseLanguage('swahili')">Swahili</button>
<button onclick="chooseLanguage('english')">English</button>
<button onclick="chooseLanguage('french')">French</button>
<button onclick="chooseLanguage('spanish')">Spanish</button>
<button onclick="chooseLanguage('german')">German</button>
<button onclick="chooseLanguage('luganda')">Luganda</button>

</div>

<div id="lessonScreen" class="card" style="display:none;">

<h2 id="lessonTitle"></h2>

<p id="lessonContent"></p>

<input id="answerInput" placeholder="Type answer">

<br>

<button onclick="nextStep()">Continue</button>

</div>

<script>

let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0
let streak = localStorage.getItem("streak") ? parseInt(localStorage.getItem("streak")) : 0
let lastDay = localStorage.getItem("lastDay")

let hearts = 3

document.getElementById("xp").innerText = xp
document.getElementById("streak").innerText = streak

let language
let phase="teach"
let index=0

const lessons = {

swahili:{
teach:[
["Hello","Jambo"],
["Friend","Rafiki"],
["Thank you","Asante"],
["Yes","Ndiyo"],
["No","Hapana"]
]
},

english:{
teach:[
["Jambo","Hello"],
["Rafiki","Friend"],
["Asante","Thank you"],
["Ndiyo","Yes"],
["Hapana","No"]
]
},

french:{
teach:[
["Hello","Bonjour"],
["Friend","Ami"],
["Thank you","Merci"],
["Yes","Oui"],
["No","Non"]
]
},

spanish:{
teach:[
["Hello","Hola"],
["Friend","Amigo"],
["Thank you","Gracias"],
["Yes","Si"],
["No","No"]
]
},

german:{
teach:[
["Hello","Hallo"],
["Friend","Freund"],
["Thank you","Danke"],
["Yes","Ja"],
["No","Nein"]
]
},

luganda:{
teach:[
["Hello","Oli otya"],
["Friend","Mikwano"],
["Thank you","Webale"],
["Yes","Ye"],
["No","Nedda"]
]
}

}

function chooseLanguage(lang){

language=lang

document.getElementById("languageScreen").style.display="none"
document.getElementById("lessonScreen").style.display="block"

startTeach()

}

function startTeach(){

phase="teach"
index=0
hearts=3
updateHearts()

showTeach()

}

function showTeach(){

document.getElementById("answerInput").style.display="none"

let pair=lessons[language].teach[index]

document.getElementById("lessonTitle").innerText="Learn"

document.getElementById("lessonContent").innerText=
pair[0]+" = "+pair[1]

}

function showQuestion(){

document.getElementById("answerInput").style.display="inline"

let pair=lessons[language].teach[index]

document.getElementById("lessonTitle").innerText="Question"

document.getElementById("lessonContent").innerText=
"Translate: "+pair[0]

document.getElementById("answerInput").value=""

}

function nextStep(){

if(phase=="teach"){

index++

if(index>=5){

phase="quiz"
index=0
showQuestion()

return

}

showTeach()

return

}

let ans=document.getElementById("answerInput").value.toLowerCase()

let correct=lessons[language].teach[index][1].toLowerCase()

if(ans==correct){

alert("Correct 🎉")

index++

if(index>=5){

finishLesson()

return

}

showQuestion()

}

else{

hearts--

updateHearts()

alert("Wrong ❌")

if(hearts==0){

alert("Lesson Failed 💔")

location.reload()

}

}

}

function finishLesson(){

xp+=50

localStorage.setItem("xp",xp)

document.getElementById("xp").innerText=xp

updateStreak()

alert("Lesson Complete +50 XP ⭐")

location.reload()

}

function updateHearts(){

document.getElementById("hearts").innerText=hearts

}

function updateStreak(){

let today=new Date().toDateString()

if(lastDay!=today){

streak++

localStorage.setItem("streak",streak)

localStorage.setItem("lastDay",today)

document.getElementById("streak").innerText=streak

}

}

</script>

</body>

</html>
