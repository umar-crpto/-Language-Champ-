
<!DOCTYPE html>
<html>

<head>

<title>Language Champ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

header{
background:#58cc02;
color:white;
padding:20px;
font-size:28px;
}

.card{
background:white;
width:330px;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#58cc02;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.hidden{
display:none;
}

input{
padding:10px;
width:85%;
margin-top:10px;
}

.progress{
height:12px;
background:#ddd;
border-radius:10px;
margin-top:10px;
}

.progress-bar{
height:12px;
background:#58cc02;
width:0%;
border-radius:10px;
}

</style>

</head>

<body>

<header>🌍 Language Champ</header>

<!-- LOGIN -->

<div class="card" id="login">

<h2>Sign In</h2>

<input id="email" placeholder="Email">
<br>
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="signUp()">Create Account</button>
<button onclick="signIn()">Sign In</button>

<p>or</p>

<button onclick="googleLogin()">Continue with Google</button>

</div>


<!-- LESSON MENU -->

<div class="card hidden" id="menu">

<h2>Select Language</h2>

<select>
<option>French</option>
<option>Spanish</option>
<option>German</option>
<option>Kiswahili</option>
</select>

<br><br>

<button onclick="startLesson()">Start Lesson</button>

</div>


<!-- PROGRESS BAR -->

<div class="card hidden" id="progressBox">

<h3>Lesson Progress</h3>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>


<!-- TEACH -->

<div class="card hidden" id="teach">

<h2>Learn This Word</h2>

<h1 id="word"></h1>

<p id="meaning"></p>

<button onclick="nextWord()">Next Word</button>

</div>


<!-- QUIZ -->

<div class="card hidden" id="quiz">

<h2>Translate This Word</h2>

<h1 id="question"></h1>

<input id="answer" placeholder="Type answer">

<br><br>

<button onclick="checkAnswer()">Check</button>

<p id="result"></p>

</div>


<!-- FINISH -->

<div class="card hidden" id="finish">

<h2>🎉 Lesson Complete</h2>

<p id="xp"></p>

</div>


<audio id="correctSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c8bfa.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_8a6b2d68a1.mp3"></audio>


<script>

let xp = 0

let lessonWords = [

{word:"Hello",meaning:"Bonjour"},
{word:"Thank you",meaning:"Merci"},
{word:"Goodbye",meaning:"Au revoir"},
{word:"Yes",meaning:"Oui"},
{word:"No",meaning:"Non"}

]

let teachIndex = 0
let quizIndex = 0

function signUp(){

alert("Account created (demo version)")

document.getElementById("login").classList.add("hidden")

document.getElementById("menu").classList.remove("hidden")

}

function signIn(){

document.getElementById("login").classList.add("hidden")

document.getElementById("menu").classList.remove("hidden")

}

function googleLogin(){

alert("Google login demo")

document.getElementById("login").classList.add("hidden")

document.getElementById("menu").classList.remove("hidden")

}

function startLesson(){

document.getElementById("menu").classList.add("hidden")

document.getElementById("teach").classList.remove("hidden")

document.getElementById("progressBox").classList.remove("hidden")

showWord()

}

function showWord(){

document.getElementById("word").innerText = lessonWords[teachIndex].word

document.getElementById("meaning").innerText = lessonWords[teachIndex].meaning

updateProgress()

}

function nextWord(){

teachIndex++

if(teachIndex < lessonWords.length){

showWord()

}else{

startQuiz()

}

}

function startQuiz(){

document.getElementById("teach").classList.add("hidden")

document.getElementById("quiz").classList.remove("hidden")

showQuestion()

}

function showQuestion(){

document.getElementById("question").innerText = lessonWords[quizIndex].word

document.getElementById("answer").value=""

updateProgress()

}

function checkAnswer(){

let user = document.getElementById("answer").value.toLowerCase()

let correct = lessonWords[quizIndex].meaning.toLowerCase()

if(user === correct){

document.getElementById("result").innerText="✅ Correct!"

document.getElementById("correctSound").play()

xp += 10

quizIndex++

if(quizIndex < lessonWords.length){

setTimeout(showQuestion,1000)

}else{

finishLesson()

}

}else{

document.getElementById("result").innerText="❌ Try again"

document.getElementById("wrongSound").play()

}

}

function finishLesson(){

document.getElementById("quiz").classList.add("hidden")

document.getElementById("finish").classList.remove("hidden")

document.getElementById("xp").innerText="You earned "+xp+" XP!"

}

function updateProgress(){

let total = lessonWords.length * 2

let progress = ((teachIndex + quizIndex)/total)*100

document.getElementById("progressBar").style.width = progress + "%"

}

</script>

</body>

</html>
