<!DOCTYPE html>
<html>
<head>
  <title>Language Champ</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #58cc02;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      background: #58cc02;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: grey;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .locked {
      background: #ccc;
    }
  </style>
</head>

<body>

<h1>Language Champ</h1>

<div class="card">
  <p>XP: <span id="xp">0</span> ⭐</p>
  <p>Hearts: <span id="hearts">3</span> ❤️</p>
</div>

<div id="languageSelect" class="card">
  <h2>Select Language</h2>
  <button onclick="chooseLanguage('english')">English</button>
  <button onclick="chooseLanguage('swahili')">Swahili</button>
</div>

<div id="levelSelect" class="card" style="display:none;">
  <h2>Select Level</h2>
  <div id="levels"></div>
</div>

<div id="lessonCard" class="card" style="display:none;">
  <h2 id="lessonTitle"></h2>
  <p id="question"></p>
  <input type="text" id="answerInput" placeholder="Type your answer">
  <br>
  <button onclick="submitAnswer()">Submit</button>
</div>

<script>

let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
let unlockedLevel = localStorage.getItem("unlockedLevel") ? parseInt(localStorage.getItem("unlockedLevel")) : 1;
let hearts = 3;

document.getElementById("xp").innerText = xp;

const lessons = {
  english: {
    1: [
      {question: "Translate to English: Jambo", answer: "hello"},
      {question: "Translate to English: Asante", answer: "thank you"},
      {question: "Translate to English: Rafiki", answer: "friend"}
    ],
    2: [
      {question: "Translate to English: Ndiyo", answer: "yes"},
      {question: "Translate to English: Hapana", answer: "no"}
    ]
  },
  swahili: {
    1: [
      {question: "Translate to Swahili: Hello", answer: "jambo"},
      {question: "Translate to Swahili: Thank you", answer: "asante"},
      {question: "Translate to Swahili: Friend", answer: "rafiki"}
    ],
    2: [
      {question: "Translate to Swahili: Yes", answer: "ndiyo"},
      {question: "Translate to Swahili: No", answer: "hapana"}
    ]
  }
};

let currentLanguage;
let currentLevel;
let questionIndex = 0;

function chooseLanguage(lang) {
  currentLanguage = lang;
  document.getElementById("languageSelect").style.display = "none";
  document.getElementById("levelSelect").style.display = "block";
  showLevels();
}

function showLevels() {
  const levelsDiv = document.getElementById("levels");
  levelsDiv.innerHTML = "";

  for (let level in lessons[currentLanguage]) {
    let btn = document.createElement("button");
    btn.innerText = "Level " + level;

    if (level > unlockedLevel) {
      btn.disabled = true;
      btn.classList.add("locked");
    }

    btn.onclick = () => startLesson(level);
    levelsDiv.appendChild(btn);
  }
}

function startLesson(level) {
  currentLevel = level;
  questionIndex = 0;
  hearts = 3;
  updateHearts();

  document.getElementById("levelSelect").style.display = "none";
  document.getElementById("lessonCard").style.display = "block";

  loadQuestion();
}

function loadQuestion() {
  let lesson = lessons[currentLanguage][currentLevel];

  if (questionIndex >= lesson.length) {
    completeLesson();
    return;
  }

  document.getElementById("lessonTitle").innerText = 
    currentLanguage.toUpperCase() + " - Level " + currentLevel;

  document.getElementById("question").innerText =
    lesson[questionIndex].question;

  document.getElementById("answerInput").value = "";
}

function submitAnswer() {
  let userAnswer = document.getElementById("answerInput").value.toLowerCase();
  let correctAnswer = lessons[currentLanguage][currentLevel][questionIndex].answer;

  if (userAnswer === correctAnswer) {
    alert("Correct! 🎉");
    questionIndex++;
    loadQuestion();
  } else {
    hearts--;
    updateHearts();
    alert("Wrong! ❌");

    if (hearts === 0) {
      alert("Lesson Failed 💔 Try Again!");
      document.getElementById("lessonCard").style.display = "none";
      document.getElementById("levelSelect").style.display = "block";
    }
  }
}

function completeLesson() {
  xp += 50;
  localStorage.setItem("xp", xp);
  document.getElementById("xp").innerText = xp;

  if (currentLevel == unlockedLevel) {
    unlockedLevel++;
    localStorage.setItem("unlockedLevel", unlockedLevel);
  }

  alert("🎉 Lesson Complete! +50 XP");

  document.getElementById("lessonCard").style.display = "none";
  document.getElementById("levelSelect").style.display = "block";
  showLevels();
}

function updateHearts() {
  document.getElementById("hearts").innerText = hearts;
}

</script>

</body>
</html>
