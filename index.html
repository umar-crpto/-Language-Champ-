<!DOCTYPE html>
<html>
<head>
<title>Language Champ</title>

<style>
body{
font-family:Arial;
background:#f7f7f7;
text-align:center;
padding:20px;
}

h1{
color:#58cc02;
}

.card{
background:white;
padding:20px;
margin:20px auto;
width:90%;
max-width:400px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#58cc02;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:gray;
}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}
</style>

</head>

<body>

<h1>Language Champ</h1>

<div class="card">
XP ⭐ <span id="xp">0</span><br>
Hearts ❤️ <span id="hearts">3</span>
</div>

<div id="languageScreen" class="card">
<h2>Choose Language</h2>
<button onclick="chooseLanguage('swahili')">Swahili</button>
<button onclick="chooseLanguage('english')">English</button>
</div>

<div id="levelScreen" class="card" style="display:none;">
<h2>Select Level</h2>
<div id="levels"></div>
</div>

<div id="lessonScreen" class="card" style="display:none;">
<h2 id="lessonTitle"></h2>
<p id="lessonContent"></p>
<input id="answerInput" placeholder="Type answer">
<br>
<button onclick="submitAnswer()">Submit</button>
</div>

<script>

let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0
let unlocked = localStorage.getItem("unlocked") ? parseInt(localStorage.getItem("unlocked")) : 1
let hearts = 3

document.getElementById("xp").innerText = xp

let language
let level
let step = 0
let questionIndex = 0

const lessons = {

swahili:{
1:{
teach:[
"Hello in Swahili is **Jambo**",
"You say **Jambo** when greeting someone politely."
],
questions:[
{q:"Translate to Swahili: Hello",a:"jambo"},
{q:"Translate to Swahili: Friend",a:"rafiki"}
]
},

2:{
teach:[
"Thank you in Swahili is **Asante**",
"You say **Asante** when someone helps you."
],
questions:[
{q:"Translate to Swahili: Thank you",a:"asante"},
{q:"Translate to Swahili: Yes",a:"ndiyo"}
]
}

},

english:{
1:{
teach:[
"In English **Hello** is a greeting.",
"You say **Hello** when meeting someone."
],
questions:[
{q:"Translate to English: Jambo",a:"hello"},
{q:"Translate to English: Rafiki",a:"friend"}
]
}
}

}

function chooseLanguage(lang){
language=lang

document.getElementById("languageScreen").style.display="none"
document.getElementById("levelScreen").style.display="block"

showLevels()
}

function showLevels(){

let div=document.getElementById("levels")
div.innerHTML=""

for(let l in lessons[language]){

let btn=document.createElement("button")
btn.innerText="Level "+l

if(l>unlocked){
btn.disabled=true
}

btn.onclick=function(){
startLesson(l)
}

div.appendChild(btn)
}

}

function startLesson(l){

level=l
step=0
questionIndex=0
hearts=3
updateHearts()

document.getElementById("levelScreen").style.display="none"
document.getElementById("lessonScreen").style.display="block"

showTeach()

}

function showTeach(){

let teach=lessons[language][level].teach

if(step<teach.length){

document.getElementById("lessonTitle").innerText="Lesson "+level
document.getElementById("lessonContent").innerText=teach[step]
document.getElementById("answerInput").style.display="none"

}else{

showQuestion()

}

step++

}

function showQuestion(){

let q=lessons[language][level].questions

if(questionIndex>=q.length){
completeLesson()
return
}

document.getElementById("lessonContent").innerText=q[questionIndex].q
document.getElementById("answerInput").style.display="inline"
document.getElementById("answerInput").value=""

}

function submitAnswer(){

if(step<=lessons[language][level].teach.length){
showTeach()
return
}

let ans=document.getElementById("answerInput").value.toLowerCase()
let correct=lessons[language][level].questions[questionIndex].a

if(ans==correct){

alert("Correct 🎉")
questionIndex++
showQuestion()

}else{

hearts--
updateHearts()

alert("Wrong ❌")

if(hearts==0){
alert("Lesson Failed 💔")
location.reload()
}

}

}

function completeLesson(){

xp+=50
localStorage.setItem("xp",xp)

if(level==unlocked){
unlocked++
localStorage.setItem("unlocked",unlocked)
}

alert("Lesson Complete +50 XP ⭐")

location.reload()

}

function updateHearts(){
document.getElementById("hearts").innerText=hearts
}

</script>

</body>
</html>
