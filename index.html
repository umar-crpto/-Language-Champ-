<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Language Champ</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

header{
background:#58cc02;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
margin-top:40px;
}

button{
background:#58cc02;
border:none;
padding:12px 25px;
font-size:18px;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#46a302;
}

.lesson-box{
background:white;
padding:25px;
margin:20px auto;
width:300px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:80%;
font-size:16px;
margin-top:10px;
}

#result{
font-weight:bold;
margin-top:15px;
font-size:18px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>
🌍 Language Champ
</header>

<div class="container">

<h2>Learn Languages the Fun Way</h2>

<p>Select a language and start learning</p>

<select id="language">
<option>French</option>
<option>Spanish</option>
<option>German</option>
<option>Kiswahili</option>
</select>

<br><br>

<button onclick="startLesson()">Start Lesson</button>

</div>

<div id="lesson" class="lesson-box hidden">

<h3>Translate this word into French</h3>

<h2 id="question">Hello</h2>

<input id="answer" placeholder="Type your answer">

<br><br>

<button onclick="checkAnswer()">Check Answer</button>

<p id="result"></p>

</div>

<script>

let correctAnswer = "bonjour"

function startLesson(){

document.getElementById("lesson").classList.remove("hidden")

}

function checkAnswer(){

let userAnswer = document.getElementById("answer").value.toLowerCase()

if(userAnswer === correctAnswer){

document.getElementById("result").innerHTML="✅ Correct! Great job!"

document.getElementById("result").style.color="green"

}else{

document.getElementById("result").innerHTML="❌ Incorrect. Try again."

document.getElementById("result").style.color="red"

}

}

</script>

</body>
</html>
