
<!DOCTYPE html>
<html>
<head>
<title>Language Champ</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:20px;
}

h1{
color:#58cc02;
}

.card{
background:white;
padding:20px;
margin:20px auto;
width:90%;
max-width:420px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#58cc02;
color:white;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:gray;
}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<h1>Language Champ</h1>

<div class="card">

XP ⭐ <span id="xp">0</span><br>
Hearts ❤️ <span id="hearts">3</span><br>
Streak 🔥 <span id="streak">0</span>

</div>

<div id="languageScreen" class="card">

<h2>Choose Language</h2>

<button onclick="chooseLanguage('swahili')">Swahili</button>

<button onclick="chooseLanguage('english')">English</button>

</div>

<div id="levelScreen" class="card" style="display:none;">

<h2>Levels</h2>

<div id="levels"></div>

</div>

<div id="lessonScreen" class="card" style="display:none;">

<h2 id="lessonTitle"></h2>

<p id="lessonContent"></p>

<input id="answerInput" placeholder="Type answer">

<br>

<button onclick="nextStep()">Continue</button>

</div>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7f7c4b5a45.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7e4d9d5a09.mp3"></audio>

<script>

let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0
let unlocked = localStorage.getItem("unlocked") ? parseInt(localStorage.getItem("unlocked")) : 1
let streak = localStorage.getItem("streak") ? parseInt(localStorage.getItem("streak")) : 0
let lastDay = localStorage.getItem("lastDay")

let hearts = 3

document.getElementById("xp").innerText = xp
document.getElementById("streak").innerText = streak

let language
let level
let stepIndex = 0

const lessons = {

swahili:{
1:[
{teach:"Hello in Swahili is Jambo",question:"Translate Hello",answer:"jambo"},
{teach:"Friend in Swahili is Rafiki",question:"Translate Friend",answer:"rafiki"},
{teach:"Thank you in Swahili is Asante",question:"Translate Thank you",answer:"asante"}
],

2:[
{teach:"Yes in Swahili is Ndiyo",question:"Translate Yes",answer:"ndiyo"},
{teach:"No in Swahili is Hapana",question:"Translate No",answer:"hapana"}
]
},

english:{
1:[
{teach:"Hello is a greeting word",question:"Translate Jambo",answer:"hello"},
{teach:"Friend means Rafiki",question:"Translate Rafiki",answer:"friend"}
]
}

}

function chooseLanguage(lang){

language = lang

document.getElementById("languageScreen").style.display="none"
document.getElementById("levelScreen").style.display="block"

showLevels()

}

function showLevels(){

let div = document.getElementById("levels")

div.innerHTML=""

for(let l in lessons[language]){

let btn=document.createElement("button")

btn.innerText="Level "+l

if(l>unlocked){

btn.disabled=true

}

btn.onclick=function(){

startLesson(l)

}

div.appendChild(btn)

}

}

function startLesson(l){

level=l

stepIndex=0

hearts=3

updateHearts()

document.getElementById("levelScreen").style.display="none"
document.getElementById("lessonScreen").style.display="block"

showTeach()

}

function showTeach(){

let step=lessons[language][level][stepIndex]

document.getElementById("lessonTitle").innerText="Lesson "+level

document.getElementById("lessonContent").innerText=step.teach

document.getElementById("answerInput").style.display="none"

}

function showQuestion(){

let step=lessons[language][level][stepIndex]

document.getElementById("lessonContent").innerText=step.question

document.getElementById("answerInput").style.display="inline"

document.getElementById("answerInput").value=""

}

let phase="teach"

function nextStep(){

if(phase=="teach"){

phase="question"

showQuestion()

return

}

let ans=document.getElementById("answerInput").value.toLowerCase()

let correct=lessons[language][level][stepIndex].answer

if(ans==correct){

document.getElementById("correctSound").play()

stepIndex++

if(stepIndex>=lessons[language][level].length){

finishLesson()

return

}

phase="teach"

showTeach()

}

else{

document.getElementById("wrongSound").play()

hearts--

updateHearts()

if(hearts==0){

alert("Lesson failed 💔")

location.reload()

}

}

}

function finishLesson(){

document.getElementById("winSound").play()

xp+=50

localStorage.setItem("xp",xp)

document.getElementById("xp").innerText=xp

if(level==unlocked){

unlocked++

localStorage.setItem("unlocked",unlocked)

}

updateStreak()

alert("Lesson Complete 🎉 +50 XP")

location.reload()

}

function updateHearts(){

document.getElementById("hearts").innerText=hearts

}

function updateStreak(){

let today=new Date().toDateString()

if(lastDay!=today){

streak++

localStorage.setItem("streak",streak)

localStorage.setItem("lastDay",today)

document.getElementById("streak").innerText=streak

}

}

</script>

</body>
</html>
