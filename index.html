<!DOCTYPE html>
<html>

<head>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  
<title>Language Champ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

header{
background:#58cc02;
color:white;
padding:20px;
font-size:26px;
}

.level{
background:#ffd900;
padding:10px;
font-weight:bold;
}

.card{
background:white;
width:340px;
margin:25px auto;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#58cc02;
color:white;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.hidden{
display:none;
}

input{
padding:10px;
width:85%;
margin-top:10px;
}

.progress{
height:12px;
background:#ddd;
border-radius:10px;
margin-top:10px;
}

.progress-bar{
height:12px;
background:#58cc02;
width:0%;
border-radius:10px;
}

</style>

</head>

<body>

<header>🌍 Language Champ</header>

<div class="level" id="levelText">Level 1</div>


<!-- LOGIN -->

<div class="card" id="login">

<h2>Welcome</h2>

<input placeholder="Email">
<br>
<input type="password" placeholder="Password">

<br>

<button onclick="enterApp()">Sign In</button>
<button onclick="enterApp()">Create Account</button>

<p>or</p>

<button onclick="enterApp()">Continue with Google</button>

<p>or</p>

<button onclick="enterApp()">Continue as Guest</button>

</div>


<!-- LANGUAGE -->

<div class="card hidden" id="languageScreen">

<h2>Select Language</h2>

<select id="language">

<option value="french">French</option>
<option value="german">German</option>
<option value="spanish">Spanish</option>
<option value="kiswahili">Kiswahili</option>

</select>

<br><br>

<button onclick="startLesson()">Start Lesson</button>

</div>


<!-- PROGRESS -->

<div class="card hidden" id="progressBox">

<h3>Lesson Progress</h3>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>


<!-- TEACH -->

<div class="card hidden" id="teach">

<h2>Learn This Word</h2>

<h1 id="word"></h1>

<p id="meaning"></p>

<button onclick="nextWord()">Next Word</button>

</div>


<!-- QUIZ -->

<div class="card hidden" id="quiz">

<h2>Translate This Word</h2>

<h1 id="question"></h1>

<input id="answer" placeholder="Type answer">

<br><br>

<button onclick="checkAnswer()">Check</button>

<p id="result"></p>

</div>


<!-- FINISH -->

<div class="card hidden" id="finish">

<h2>🎉 Lesson Complete</h2>

<p id="xp"></p>

<button onclick="restart()">Continue Learning</button>

</div>


<audio id="correctSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9c8bfa.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_8a6b2d68a1.mp3"></audio>


<script>

let xp = 0
let teachIndex = 0
let quizIndex = 0
let correctAnswers = 0
let level = 1
let currentLanguage = ""


let lessons = {

french:[
{word:"Hello",meaning:"Bonjour"},
{word:"Thank you",meaning:"Merci"},
{word:"Goodbye",meaning:"Au revoir"},
{word:"Yes",meaning:"Oui"},
{word:"No",meaning:"Non"}
],

german:[
{word:"Hello",meaning:"Hallo"},
{word:"Thank you",meaning:"Danke"},
{word:"Goodbye",meaning:"Tschüss"},
{word:"Yes",meaning:"Ja"},
{word:"No",meaning:"Nein"}
],

spanish:[
{word:"Hello",meaning:"Hola"},
{word:"Thank you",meaning:"Gracias"},
{word:"Goodbye",meaning:"Adiós"},
{word:"Yes",meaning:"Sí"},
{word:"No",meaning:"No"}
],

kiswahili:[
{word:"Hello",meaning:"Habari"},
{word:"Thank you",meaning:"Asante"},
{word:"Goodbye",meaning:"Kwaheri"},
{word:"Yes",meaning:"Ndiyo"},
{word:"No",meaning:"Hapana"}
]

}


function enterApp(){

document.getElementById("login").classList.add("hidden")
document.getElementById("languageScreen").classList.remove("hidden")

}


function startLesson(){

currentLanguage = document.getElementById("language").value

teachIndex = 0
quizIndex = 0
correctAnswers = 0
xp = 0

document.getElementById("languageScreen").classList.add("hidden")

document.getElementById("teach").classList.remove("hidden")
document.getElementById("progressBox").classList.remove("hidden")

showWord()

}


function showWord(){

let data = lessons[currentLanguage][teachIndex]

document.getElementById("word").innerText = data.word
document.getElementById("meaning").innerText = data.meaning

updateProgress()

}


function nextWord(){

teachIndex++

if(teachIndex < 5){

showWord()

}else{

startQuiz()

}

}


function startQuiz(){

document.getElementById("teach").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

showQuestion()

}


function showQuestion(){

let data = lessons[currentLanguage][quizIndex]

document.getElementById("question").innerText = data.word
document.getElementById("answer").value=""
document.getElementById("result").innerText=""

updateProgress()

}


function checkAnswer(){

let user = document.getElementById("answer").value.toLowerCase()
let correct = lessons[currentLanguage][quizIndex].meaning.toLowerCase()

if(user === correct){

document.getElementById("correctSound").play()
document.getElementById("result").innerText="✅ Correct!"

xp += 10
correctAnswers++

quizIndex++

if(quizIndex < 5){

setTimeout(showQuestion,800)

}else{

finishLesson()

}

}else{

document.getElementById("wrongSound").play()
document.getElementById("result").innerText="❌ Try again"

}

}


function finishLesson(){

document.getElementById("quiz").classList.add("hidden")
document.getElementById("finish").classList.remove("hidden")

document.getElementById("xp").innerText="You earned "+xp+" XP!"

if(correctAnswers === 5){

level++
document.getElementById("levelText").innerText="Level "+level

}

}


function restart(){

document.getElementById("finish").classList.add("hidden")
document.getElementById("languageScreen").classList.remove("hidden")

}


function updateProgress(){

let total = 10
let progress = ((teachIndex + quizIndex)/total)*100

document.getElementById("progressBar").style.width = progress + "%"

}

</script>

</body>
</html>
